name: ETF Radar V3 Daily

on:
  schedule:
    # 北京时间 15:30 = UTC 07:30
    - cron: '30 7 * * 1-5'
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  run-strategy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ETF Radar V3
        run: python3 radar_strategy_v3_1.py

      - name: Generate dashboard
        run: python3 generate_dashboard.py

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: etf-plan-${{ github.run_id }}
          path: reports/plan_v3_1_*.txt
          retention-days: 30

      - name: Commit reports and pages to repo
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "ETF Bot"
          git config user.email "bot@etf-radar.com"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git add reports/ pages/
          git status
          git diff --cached --quiet || (git commit -m "daily: etf plan and dashboard $(TZ=Asia/Shanghai date +%Y%m%d)" && git push)
          echo "commit done"

      - name: Send Telegram notification
        continue-on-error: true
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          LATEST=$(ls -t reports/plan_v3_1_*.txt | head -1)
          TEXT=$(cat "$LATEST" | python3 -c "import sys,json; print(json.dumps(sys.stdin.read()[:3800]))")
          curl -s -X POST "https://api.telegram.org/bot$TG_BOT_TOKEN/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"$TG_CHAT_ID\",\"text\":$TEXT,\"parse_mode\":\"Markdown\"}" || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages/

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: run-strategy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
