name: Update ETF Universe

on:
  schedule:
    - cron: '0 1 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Update ETF universe
        env:
          PYTHONUNBUFFERED: 1
        run: python3 etf_filter.py
      - name: Commit updated universe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "ETF Bot"
          git config user.email "bot@etf-radar.com"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git add etf_universe.py
          git diff --cached --quiet || git commit -m "update: etf universe $(date +%Y%m%d)"
          git push || echo "push skipped"
      - name: Upload log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: universe-filter-log
          path: reports/universe_filter.log
