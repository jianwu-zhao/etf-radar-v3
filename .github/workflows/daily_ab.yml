name: ETF Radar V3 A/B Test

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Preload data
        run: |
          set -x
          python3 preload_data.py 2>&1 | tee reports/preload.log
          ls -la data_cache/
          wc -c data_cache/yahoo_cache.json
      - name: Run V3.1
        run: python3 radar_strategy_v3_1.py 2>&1 | tee reports/daily_v3_1.log
      - name: Run V3.2
        run: python3 radar_strategy_v3_2.py 2>&1 | tee reports/daily_v3_2.log
      - name: Generate dashboards
        run: |
          python3 generate_dashboard.py --plan reports/plan_v3_1_$(date +%Y%m%d).json --output pages/index.html
          python3 generate_dashboard.py --plan reports/plan_v3_2_$(date +%Y%m%d).json --output pages/index_v3_2.html
      - name: Commit plans
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "ETF Bot"
          git config user.email "bot@etf-radar.com"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git add reports/ pages/ data_cache/
          git diff --cached --quiet || git commit -m "A/B: daily plans $(TZ=Asia/Shanghai date +%Y%m%d)"
          git push || echo "push skipped"
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ab-logs
          path: reports/*.log
