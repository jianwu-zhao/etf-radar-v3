name: ETF V3.2 Grid Search

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  grid:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Grid search
        run: python3 backtest_v3_2.py --grid --top 6 --fee 0.0005 2>&1 | tee reports/grid_search.log
      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grid-search-log
          path: reports/grid_search.log
