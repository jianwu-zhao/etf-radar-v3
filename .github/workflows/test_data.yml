name: Test Data Source

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Test akshare spot
        run: |
          python3 -c "import akshare; print('akshare version:', akshare.__version__)" 2>&1 | tee reports/test_akshare.log
          python3 -c "
          import akshare as ak
          df = ak.fund_etf_spot_em()
          print('spot rows:', len(df))
          print(df[df['代码']=='518880'])
          " 2>&1 | tee -a reports/test_akshare.log
      - name: Test data_source
        run: |
          python3 -c "
          from data_source import daily_kline, realtime_quote
          k = daily_kline('518880', limit=5)
          print('kline rows:', len(k))
          print(k[0])
          print('realtime:', realtime_quote('518880'))
          " 2>&1 | tee reports/test_data.log
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-data-logs
          path: reports/test_*.log
